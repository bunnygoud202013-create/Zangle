<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zangle Technologies</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-color: #f7f9fc;
        }
        .job-listing-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .job-card-new {
            background: #fff;
            border-left: 5px solid #64E0EB;
            padding: 20px;
            width: 300px;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .job-card-new:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
        }
        .desc-btn {
            background: #64E0EB;
            color: #fff;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .desc-btn:hover {
            background: #4CB8C4;
        }
    </style>
</head>
<body>
    <div class="job-listing-wrapper" id="job-listing-wrapper"></div>
    
    <!-- Job Description Modal -->
    <div class="modal fade" id="jobModal" tabindex="-1" role="dialog" aria-labelledby="jobModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="jobModalLabel"></h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="jobModalBody"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let jobs = [];

            fetch("jobs.json")
                .then(response => response.json())
                .then(data => {
                    jobs = data; // Store the loaded data in the jobs variable
                    renderJobs(jobs);
                });

            function renderJobs(jobs) {
                const jobContainer = document.getElementById("job-listing-wrapper");
                jobContainer.innerHTML = ""; // Clear previous job listings

                jobs.forEach((job) => {
                    const jobCard = document.createElement("div");
                    jobCard.classList.add("job-card-new");
                    jobCard.innerHTML = `
                        <div class="job-header"><strong>${job.title}</strong></div>
                        <p><strong>Location:</strong> ${job.location}</p>
                        <p><strong>Employment Type:</strong> ${job.employment_type}</p>
                        <p><strong>Posted:</strong> ${job.posted_date}</p>
                        <button class="desc-btn" data-toggle="modal" data-target="#jobModal" onclick="openModal('${encodeURIComponent(job.title)}', '${encodeURIComponent(job.description)}')">
                            Job Description <i class="fa fa-info-circle"></i>
                        </button>
                    `;
                    jobContainer.appendChild(jobCard);
                });
            }
        });

        function openModal(title, description) {
            document.getElementById("jobModalLabel").innerText = decodeURIComponent(title);
            document.getElementById("jobModalBody").innerText = decodeURIComponent(description);
        }
    </script>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
  <script src="js/site-nav.js"></script>
  <script src="js/zangle-redesign.js"></script>
</body>
</html>
